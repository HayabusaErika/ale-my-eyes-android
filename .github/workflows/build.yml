name: Build and Release

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag for manual publishing; defaults to manual-<run number> when empty'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android package
    env:
      ANDROID_NDK_VERSION: 27.3.13750724
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi

      - name: Install cargo-apk
        run: cargo install cargo-apk

      - name: Install Android NDK
        run: |
          ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" "ndk;${ANDROID_NDK_VERSION}"
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" "platforms;android-30"
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" "platforms;android-34"
          yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses

      - name: Build
        run: |
          ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export ANDROID_NDK_VERSION="${ANDROID_NDK_VERSION}"
          ./scripts/package-android.sh

      - name: Upload Android apks
        uses: actions/upload-artifact@v4
        with:
          name: ale-my-eyes-android
          path: |
            ale-my-eyes-android/ale-my-eyes-arm64.apk
            ale-my-eyes-android/ale-my-eyes-armv7.apk

  release:
    name: Publish GitHub release
    needs: [build-android]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.release_tag || format('manual-{0}', github.run_number)) || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.release_tag || format('manual-{0}', github.run_number)) || github.ref_name }}
          files: |
            artifacts/ale-my-eyes-android/ale-my-eyes-arm64.apk
            artifacts/ale-my-eyes-android/ale-my-eyes-armv7.apk
          draft: false
          prerelease: false
